name: link-checker

on:
  workflow_call:
    inputs:
      environment_file:
        description: "Name of conda environment file"
        required: false
        default: "environment.yml"
        type: string
      path_to_notebooks:
        description: "Location of the JupyterBook source relative to repo root"
        required: false
        default: "./"
        type: string
      build_command:
        description:
          "The linux command to run the link checker for the book or site"
        required: false
        default: "myst build --check-links --strict"
        type: string

concurrency:
  group: ${{ github.workflow }}=${{ github.head_ref}}
  cancel-in-progress: true

jobs:
  link-checker:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup environment with micromamba
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-file: ${{ inputs.environment_file }}

      - name: Check external links
        run: |
          cd ${{ inputs.path_to_notebooks }}
          ${{ inputs.build_command }}
