name: ci

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "tests/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "tests/**"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: $${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-book:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        cookbook:
          - default
    uses: ./.github/workflows/build-book.yaml
    with:
      path_to_notebooks: tests/${{ matrix.cookbook }}
      environment_file: tests/${{ matrix.cookbook }}/environment.yml
      artifact_name: ${{ matrix.cookbook }}-book-zip
      base_url: /${{ github.event.repository.name }}/tests/${{ matrix.cookbook }}
    secrets: inherit

  link-checker:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        cookbook:
          - default
    uses: ./.github/workflows/link-checker.yaml
    with:
      path_to_notebooks: tests/${{ matrix.cookbook }}
      environment_file: tests/${{ matrix.cookbook }}/environment.yml

  deploy-book:
    if: github.event_name == 'push'
    permissions:
      contents: write
    needs: build-book
    strategy:
      fail-fast: false
      matrix:
        cookbook:
          - default
    uses: ./.github/workflows/deploy-book.yaml
    with:
      artifact_name: ${{ matrix.cookbook }}-book-zip
      destination_dir: _ci/${{ matrix.cookbook }}
      publish_dir: tests/${{ matrix.cookbook }}/_build/html

  deploy-preview:
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
    needs: build-book
    strategy:
      fail-fast: false
      matrix:
        cookbook:
          - default
    uses: ./.github/workflows/deploy-book.yaml
    with:
      artifact_name: ${{ matrix.cookbook }}-book-zip
      destination_dir: _preview/ci-${{ matrix.cookbook }}
      publish_dir: tests/${{ matrix.cookbook }}/_build/html

  preview-comment:
    permissions:
      issues: read
      pull-requests: write
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        cookbook:
          - default
    uses: ./.github/workflows/preview-comment.yaml
    with:
      pull_request_number: ${{ github.event.pull_request.number }}
      sha: ${{ github.event.pull_request.head.sha }}
      site_name: Test cookbook ${{ matrix.cookbook }}
