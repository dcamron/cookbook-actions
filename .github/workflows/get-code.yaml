name: get-code

on:
  workflow_call:
    inputs:
      code_artifact_name:
        description:
          "Name of the code zip artifact, usually tagged with a PR number"
        required: false
        default: "code-zip"
        type: string

# instead of calling build-book directly, we will create and upload an artifact containing the source
# For security reasons, we strip out the .github directory
#  So a PR cannot introduce malicious workflow code

jobs:
  get-code:
    runs-on: ubuntu-slim
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove .github directory
        id: remove_directory
        run: |
          rm -rf .github/

      - name: Zip the code
        run: |
          set -x
          set -e
          if [ -f pr_code.zip ]; then
              rm -rf pr_code.zip
          fi
          zip -r pr_code.zip .

      - name: Upload zipped code artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: code-zip-${{ github.event.number }}
          path: ./pr_code.zip
