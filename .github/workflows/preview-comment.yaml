name: preview-comment

on:
  workflow_call:
    inputs:
      pull_request_number:
        description: "Number of the Pull Request event that needs commenting"
        required: true
        type: string
      sha:
        description: "SHA of the commit associated with this Pull Request"
        required: true
        type: string
      site_name:
        description: "Name of the website in comment"
        required: false
        default: "The Cookbook"
        type: string

jobs:
  make-checks:
    runs-on: ubuntu-slim
    steps:
      - name: Create in-progress check run
        if: github.event.workflow_run.conclusion == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            /repos/${{ github.repository }}/check-runs \
            -f name='PR Preview' \
            -f head_sha='${{ inputs.sha }}' \
            -f status='in_progress' \
            -f external_id='preview-${{ inputs.sha }}'

      - name: Update completed check run
        if: github.event.workflow_run.conclusion != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          check_run_id=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${{ github.repository }}/commits/${{ inputs.sha }}/check-runs" \
            --jq '[.check_runs[] | select(.name == "PR Preview")] | last | .id')

          gh api -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${{ github.repository }}/check-runs/${check_run_id}" \
            -f status='completed' \
            -f conclusion='${{ github.event.workflow_run.conclusion }}' \
            -f completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  comment:
    runs-on: ubuntu-slim
    steps:
      - name: Fetch Repo Name
        id: repo-name
        run: echo "value=$(echo '${{ github.repository }}' | awk -F '/' '{print
          $2}')" >> $GITHUB_OUTPUT # just the repo name, not owner

      - name: Set message value
        run: >
          echo "comment_message=👋 Thanks for opening this PR! ${{
          inputs.site_name }} will be automatically built with [GitHub
          Actions](https://github.com/features/actions). To see the status of
          your deployment, click below." >> $GITHUB_ENV

      - name: Find preview comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: fc
        with:
          issue-number: "${{ inputs.pull_request_number }}"
          comment-author: "github-actions[bot]"
          body-includes: "${{ env.comment_message }}"

      - name: Create preview comment
        if: |
          github.event.workflow_run.conclusion != 'success'
          && steps.fc.outputs.comment-id == ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          issue-number: ${{ inputs.pull_request_number }}
          body: |
            ${{ env.comment_message }}
            🔍 Git commit SHA: ${{ inputs.sha }}
            ✅ Deployment Preview URL: In Progress

      - name: Update preview comment
        if: |
          github.event.workflow_run.conclusion != 'success'
          && steps.fc.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            ${{ env.comment_message }}
            🔍 Git commit SHA: ${{ inputs.sha }}
            ✅ Deployment Preview URL: In Progress

      - name: Set preview URL
        if: |
          github.event.workflow_run.conclusion == 'success'
          && steps.fc.outputs.comment-id != ''
        id: preview-url
        run: |
          shopt -s nocasematch
          if [[ ${{ steps.repo-name.outputs.value }} = ${{ github.repository_owner }}.github.io ]]
          then
            echo "url=https://${{ steps.repo-name.outputs.value }}/_preview/${{ inputs.pull_request_number }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://${{ github.repository_owner }}.github.io/${{ steps.repo-name.outputs.value }}/_preview/${{ inputs.pull_request_number }}" >> $GITHUB_OUTPUT
          fi
          shopt -u nocasematch

      - name: Finalize preview comment
        if: |
          github.event.workflow_run.conclusion == 'success'
          && steps.fc.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            ${{ env.comment_message }}
            🔍 Git commit SHA: ${{ inputs.sha }}
            ✅ Deployment Preview URL: ${{ steps.preview-url.outputs.url }}
